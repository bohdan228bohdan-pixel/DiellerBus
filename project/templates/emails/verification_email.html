<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body{font-family:Helvetica,Arial,sans-serif;color:#111;margin:0;padding:0;background:#fff}
      .wrapper{max-width:640px;margin:0 auto;padding:28px}
      .card{background:#ffffff;border-radius:6px;padding:28px;border:1px solid #e6e6e9}
      .title{font-size:24px;font-weight:800;margin:0 0 10px}
      .lead{color:#6b7280;margin:0 0 18px}
      .code-box{margin:22px 0;padding:20px;border-radius:8px;border:1px solid #e6e6e9;background:#f8fafc;text-align:center}
      .code{font-size:34px;letter-spacing:8px;font-weight:900;color:#0f172a}
      .footer{font-size:12px;color:#9aa0a6;margin-top:20px}
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div style="text-align:center">
          <h1 class="title">Код підтвердження електронної пошти</h1>
          <p class="lead">Введіть цей код на екрані підтвердження, щоб завершити реєстрацію</p>
        </div>
        <div class="code-box">
          <div class="code">{{ code }}</div>
        </div>
        <p class="lead">Код дійсний протягом короткого часу. Якщо ви не бачите екран підтвердження, спробуйте оновити сторінку або увійти знову.</p>
        <div class="footer">Якщо ви не запитували цей код, просто ігноруйте цей лист.</div>
      </div>
    </div>
  </body>
</html>
