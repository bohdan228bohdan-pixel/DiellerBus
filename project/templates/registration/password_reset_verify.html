{% extends "base.html" %}

{% block head_extra %}
<style>
  .auth-wrap{display:flex;align-items:center;justify-content:center;padding:60px 20px}
  .auth-card{max-width:540px;width:100%;background:linear-gradient(180deg,rgba(0,0,0,0.85),rgba(10,10,10,0.95));padding:28px;border-radius:12px;border:1px solid rgba(255,0,0,0.06);backdrop-filter: blur(4px);color:#fff}
  .auth-card h2{color:var(--accent-red);margin-bottom:8px}
  .auth-card p{color:#ccc}
  .code-single{width:100%;font-size:22px;padding:12px 6px;border:0;border-bottom:2px solid rgba(255,255,255,0.12);background:transparent;color:#fff;outline:none}
  .resend-link{color:var(--accent-red);font-weight:700;text-decoration:none}
  .form-group{margin-bottom:12px}
  .btn{background:var(--accent-red);color:#fff;padding:10px 18px;border-radius:8px;border:0}
  @media(max-width:600px){ .auth-wrap{padding:28px} .auth-card{padding:18px} }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Відновлення пароля</h2>
    <p>Ми надіслали 6-значний код на вашу пошту{% if email %}: <strong>{{ email }}</strong>{% endif %}</p>

    {% if error %}
      <div style="color:#ffb4b4;margin-bottom:10px">{{ error }}</div>
    {% endif %}

    <form method="post" id="resetForm">
      {% csrf_token %}
      <div class="form-group">
        <input name="code" id="codeInput" class="code-single" placeholder="Введіть код" autocomplete="one-time-code" inputmode="numeric" />
      </div>
      <div class="form-group">
        <label for="new_password1">Новий пароль</label>
        <input type="password" id="new_password1" name="new_password1" class="code-single" placeholder="Мінімум 8 символів" required />
      </div>
      <div class="form-group">
        <label for="new_password2">Повторіть пароль</label>
        <input type="password" id="new_password2" name="new_password2" class="code-single" placeholder="Повторіть пароль" required />
      </div>
      <div style="text-align:center;margin-top:10px"><button type="submit" class="btn">Змінити пароль</button></div>
    </form>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px">
      <a href="#" id="resendLink" class="resend-link">Надіслати код повторно</a>
      <span id="resendTimer" style="color:#999;font-size:13px"></span>
    </div>
    <div id="resendMsg" style="text-align:center;margin-top:10px;color:#9aa0a6"></div>
  </div>
</div>

<script>
  (function(){
    const codeInput = document.getElementById('codeInput');
    if (codeInput) codeInput.focus();

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    const resendLink = document.getElementById('resendLink');
    const resendMsg = document.getElementById('resendMsg');
    const resendTimer = document.getElementById('resendTimer');
    let cooldown = 0; let timerId = null;

    function startCooldown(seconds){
      cooldown = seconds;
      resendLink.style.pointerEvents = 'none';
      resendLink.style.opacity = '0.6';
      updateTimer();
      timerId = setInterval(() => { updateTimer(); }, 1000);
    }

    function updateTimer(){
      if (cooldown <= 0){
        clearInterval(timerId);
        resendTimer.textContent = '';
        resendLink.style.pointerEvents = '';
        resendLink.style.opacity = '';
        return;
      }
      resendTimer.textContent = `Повторно через ${cooldown}s`;
      cooldown -= 1;
    }

    resendLink && resendLink.addEventListener('click', async function(e){
      e.preventDefault();
      if (cooldown > 0) return;
      resendMsg.textContent = '';
      const url = '{% url "main:resend_password_reset" %}';
      try{
        const resp = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify({})
        });
        const data = await resp.json();
        if (data.ok){
          resendMsg.style.color = '#c8f5d4';
          resendMsg.textContent = data.message || 'Код надіслано';
          startCooldown(30);
        }else{
          resendMsg.style.color = '#ffb4b4';
          resendMsg.textContent = data.message || 'Сталася помилка';
          startCooldown(8);
        }
      }catch(err){
        resendMsg.style.color = '#ffb4b4';
        resendMsg.textContent = 'Не вдалося надіслати запит';
        startCooldown(8);
      }
    });
  })();
</script>

{% endblock %}
