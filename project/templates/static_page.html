{% extends 'base.html' %}

{% block title %}{{ page.title }} — {{ site_config.shop_name|default:'Dieller Bus' }}{% endblock %}

{% block content %}
<div class="container" style="max-width:1100px;margin:48px auto;padding:32px;background:#ffffff;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06);color:#111;font-family:inherit;">
  <h1 style="text-align:center;margin-bottom:18px;color:#c53030;font-weight:900">{{ page.title }}</h1>
  <div style="max-width:900px;margin:0 auto;color:#222;line-height:1.6">
    {{ page.content|safe }}
  </div>
</div>
{% endblock %}
