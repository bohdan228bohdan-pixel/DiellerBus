{% extends "base.html" %}

{% block content %}
<div style="display:flex;min-height:calc(100vh - 200px);align-items:center;justify-content:center;padding:32px;">
  <div class="auth-panel" style="max-width:540px;width:100%;background:linear-gradient(180deg,#f7f7f8,#f3f4f6);padding:28px;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.45);color:#111;">
    <h2 style="color:var(--accent-red);margin-bottom:6px">Підтвердження зміни пароля</h2>
    <p class="verify-help" style="color:#374151;margin-bottom:12px">Ми щойно надіслали 6-значний код на вашу пошту{% if email %}: <strong>{{ email }}</strong>{% endif %}</p>

    {% if error %}
      <div style="color:#b91c1c;margin-bottom:10px">{{ error }}</div>
    {% endif %}

    <form method="post" id="verifyForm">
      {% csrf_token %}
      <div class="code-inputs" role="group" aria-label="Введіть код підтвердження" style="display:flex;gap:8px;justify-content:center;margin:18px 0">
        <input inputmode="numeric" pattern="[0-9]*" maxlength="1" class="digit" style="width:48px;height:56px;font-size:28px;text-align:center;border:1px solid rgba(15,23,42,0.06);border-radius:8px;padding:6px;background:#fff;color:#111" />
        <input inputmode="numeric" pattern="[0-9]*" maxlength="1" class="digit" style="width:48px;height:56px;font-size:28px;text-align:center;border:1px solid rgba(15,23,42,0.06);border-radius:8px;padding:6px;background:#fff;color:#111" />
        <input inputmode="numeric" pattern="[0-9]*" maxlength="1" class="digit" style="width:48px;height:56px;font-size:28px;text-align:center;border:1px solid rgba(15,23,42,0.06);border-radius:8px;padding:6px;background:#fff;color:#111" />
        <input inputmode="numeric" pattern="[0-9]*" maxlength="1" class="digit" style="width:48px;height:56px;font-size:28px;text-align:center;border:1px solid rgba(15,23,42,0.06);border-radius:8px;padding:6px;background:#fff;color:#111" />
        <input inputmode="numeric" pattern="[0-9]*" maxlength="1" class="digit" style="width:48px;height:56px;font-size:28px;text-align:center;border:1px solid rgba(15,23,42,0.06);border-radius:8px;padding:6px;background:#fff;color:#111" />
        <input inputmode="numeric" pattern="[0-9]*" maxlength="1" class="digit" style="width:48px;height:56px;font-size:28px;text-align:center;border:1px solid rgba(15,23,42,0.06);border-radius:8px;padding:6px;background:#fff;color:#111" />
      </div>
      <input type="hidden" name="code" id="codeHidden">
      <div style="text-align:center;margin-top:6px"><button type="submit" class="btn">Підтвердити та змінити пароль</button></div>
    </form>

    <div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:14px">
      <a href="#" id="resendLink" style="color:var(--accent-red);font-weight:700">Надіслати код повторно</a>
      <span id="resendTimer" style="color:#6b7280;font-size:13px"></span>
    </div>
    <div id="resendMsg" style="text-align:center;margin-top:10px"></div>

  </div>
</div>

<script>
  (function(){
    const inputs = Array.from(document.querySelectorAll('.code-inputs .digit'));
    inputs.forEach((el, idx) => {
      el.addEventListener('input', (e) => {
        const v = e.target.value.replace(/[^0-9]/g,'');
        e.target.value = v.slice(0,1);
        if (v && idx < inputs.length-1) inputs[idx+1].focus();
        updateHidden();
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && idx>0){ inputs[idx-1].focus(); }
      });
    });
    function updateHidden(){
      const val = inputs.map(i=>i.value||'').join('');
      document.getElementById('codeHidden').value = val;
    }
    if (inputs.length) inputs[0].focus();

    // CSRF helper
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    const resendLink = document.getElementById('resendLink');
    const resendMsg = document.getElementById('resendMsg');
    const resendTimer = document.getElementById('resendTimer');
    let cooldown = 0; let timerId = null;

    function startCooldown(seconds){
      cooldown = seconds;
      resendLink.style.pointerEvents = 'none';
      resendLink.style.opacity = '0.6';
      updateTimer();
      timerId = setInterval(() => { updateTimer(); }, 1000);
    }

    function updateTimer(){
      if (cooldown <= 0){
        clearInterval(timerId);
        resendTimer.textContent = '';
        resendLink.style.pointerEvents = '';
        resendLink.style.opacity = '';
        return;
      }
      resendTimer.textContent = `Повторно через ${cooldown}s`;
      cooldown -= 1;
    }

    resendLink && resendLink.addEventListener('click', async function(e){
      e.preventDefault();
      if (cooldown > 0) return;
      resendMsg.textContent = '';
      const url = '{% url "main:resend_password_change_code" %}';
      try{
        const resp = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify({})
        });
        const data = await resp.json();
        if (data.ok){
          resendMsg.style.color = '#065f46';
          resendMsg.textContent = data.message || 'Код надіслано';
          startCooldown(30);
        }else{
          resendMsg.style.color = '#991b1b';
          resendMsg.textContent = data.message || 'Сталася помилка';
          startCooldown(8);
        }
      }catch(err){
        resendMsg.style.color = '#991b1b';
        resendMsg.textContent = 'Не вдалося надіслати запит';
        startCooldown(8);
      }
    });
  })();
</script>

<style>
  @media(max-width:600px){ .auth-panel{padding:18px} .code-inputs .digit{width:40px;height:48px;font-size:22px} }
</style>

{% endblock %}
