{% extends 'base.html' %}
{% load static %}

{% block title %}Міста — Dieller Bus{% endblock %}

{% block content %}
<div class="container ticket-page py-4">
  <h1 class="ticket-title">Список міст</h1>
  <p class="ticket-sub">Міста з бази даних. Фільтр: країна.</p>

  <div class="mb-3 d-flex align-items-center">
    <label for="countryFilter" class="me-2">Фільтр:</label>
    <select id="countryFilter" class="form-select" style="width:160px;display:inline-block;">
      <option value="">Усі</option>
      <option value="UA">Україна (UA)</option>
      <option value="PL">Польща (PL)</option>
    </select>
    <button id="refreshCities" class="btn btn-outline-light btn-sm ms-3">Оновити</button>
  </div>

  <div class="table-responsive">
    <table class="table table-dark table-striped" id="citiesTable">
      <thead>
        <tr><th>ID</th><th>Назва</th><th>Країна</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadAndRenderCities(){
  try{
    const res = await fetch('/api/cities/');
    if (!res.ok) throw new Error('Failed to load cities');
    const data = await res.json();
    const ua = data.UA || [];
    const pl = data.PL || [];
    const rows = [];
    ua.forEach(c => rows.push({id:c.id, name:c.name, country:'UA'}));
    pl.forEach(c => rows.push({id:c.id, name:c.name, country:'PL'}));
    const tbody = document.querySelector('#citiesTable tbody');
    const filter = document.getElementById('countryFilter').value;
    tbody.innerHTML = rows
      .filter(r => !filter || r.country === filter)
      .map(r => `<tr><td>${r.id}</td><td>${r.name}</td><td>${r.country}</td></tr>`)
      .join('');
  }catch(e){
    console.error(e);
    document.querySelector('#citiesTable tbody').innerHTML = '<tr><td colspan="3">Помилка завантаження міст.</td></tr>';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadAndRenderCities();
  document.getElementById('refreshCities').addEventListener('click', loadAndRenderCities);
  document.getElementById('countryFilter').addEventListener('change', loadAndRenderCities);
});
</script>
{% endblock %}
